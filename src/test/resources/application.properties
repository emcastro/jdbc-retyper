# Configuration de la base de données DuckDB
spring.datasource.driver-class-name=org.duckdb.DuckDBDriver

spring.datasource.url=jdbc:duckdb:
spring.datasource.username=
spring.datasource.password=

# Configuration de Hibernate (optionnel si utilisé)
spring.jpa.hibernate.ddl-auto=update

# Niveau de journalisation pour les requêtes SQL
logging.level.org.springframework.jdbc.core=DEBUG
